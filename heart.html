<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Heart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        canvas { display: block; }
        .controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            font-weight: 600;
        }
        .btn:hover { transform: scale(1.07); opacity: 0.9; }
        .btn-pulse  { background: #e94560; color: #fff; }
        .btn-color  { background: #7c3aed; color: #fff; }
        .btn-rain   { background: #0891b2; color: #fff; }
        .btn-save   { background: #059669; color: #fff; }
        .label {
            position: fixed;
            top: 30px;
            color: rgba(255,255,255,0.15);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<span class="label">Beautiful Heart</span>
<canvas id="c"></canvas>

<div class="controls">
    <button class="btn btn-pulse"  id="btnPulse">💓 Pulse</button>
    <button class="btn btn-color"  id="btnColor">🎨 Color</button>
    <button class="btn btn-rain"   id="btnRain">✨ Particles</button>
    <button class="btn btn-save"   id="btnSave">💾 Save PNG</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, cx, cy, baseSize;

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
    baseSize = Math.min(W, H) * 0.38;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ── State ──────────────────────────────────────────────
let t         = 0;          // animation time
let scale     = 1;          // current drawn scale
let pulseDir  = 1;
let pulsing   = true;
let colorMode = 0;          // 0 = rose-pink, 1 = purple, 2 = cyan, 3 = gold
let particles = [];
let showParticles = true;

const colorPalettes = [
    { inner: ['#ff0050', '#ff6fa8'], outer: ['#ff0050', '#7a0025'], glow: '#ff2060' },
    { inner: ['#b366ff', '#e0aaff'], outer: ['#7b2fff', '#3a007a'], glow: '#a050ff' },
    { inner: ['#00e5ff', '#80ffff'], outer: ['#007acc', '#003355'], glow: '#00ccff' },
    { inner: ['#ffd700', '#fff59d'], outer: ['#ff8c00', '#7a3c00'], glow: '#ffaa00' },
];

// ── Heart parametric path ──────────────────────────────
//   x = 16 sin³(θ)
//   y = 13 cos(θ) − 5 cos(2θ) − 2 cos(3θ) − cos(4θ)
function heartPoint(theta, r) {
    const x = 16 * Math.pow(Math.sin(theta), 3);
    const y = -(13 * Math.cos(theta) - 5 * Math.cos(2*theta) - 2 * Math.cos(3*theta) - Math.cos(4*theta));
    return { x: cx + x * r, y: cy + y * r };
}

function buildHeartPath(r) {
    ctx.beginPath();
    const steps = 300;
    for (let i = 0; i <= steps; i++) {
        const theta = (i / steps) * Math.PI * 2;
        const pt = heartPoint(theta, r);
        i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
    }
    ctx.closePath();
}

// ── Particles ──────────────────────────────────────────
class Particle {
    constructor() { this.reset(true); }
    reset(init) {
        // spawn on heart outline
        const theta = Math.random() * Math.PI * 2;
        const r     = baseSize / 16;
        const pt    = heartPoint(theta, r * scale);
        this.x  = pt.x;
        this.y  = pt.y;
        this.vx = (Math.random() - 0.5) * 1.4;
        this.vy = (Math.random() - 1.5) * 1.2;
        this.life   = init ? Math.random() : 1;
        this.decay  = 0.008 + Math.random() * 0.012;
        this.size   = 2 + Math.random() * 3;
        this.hue    = 340 + Math.random() * 40;
    }
    update() {
        this.x    += this.vx;
        this.y    += this.vy;
        this.vy   -= 0.03;
        this.life -= this.decay;
        if (this.life <= 0) this.reset(false);
    }
    draw() {
        const pal = colorPalettes[colorMode];
        ctx.save();
        ctx.globalAlpha = this.life * 0.85;
        ctx.fillStyle = pal.glow;
        ctx.shadowColor = pal.glow;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

// ── Draw one frame ────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);

    const pal  = colorPalettes[colorMode];
    const r    = baseSize / 16 * scale;

    // --- Glow layers (draw heart 3× with blur) ---
    for (let g = 3; g >= 1; g--) {
        ctx.save();
        buildHeartPath(r * (1 + g * 0.04));
        ctx.shadowColor = pal.glow;
        ctx.shadowBlur  = 30 * g;
        ctx.fillStyle   = pal.glow;
        ctx.globalAlpha = 0.08 / g;
        ctx.fill();
        ctx.restore();
    }

    // --- Main heart fill gradient ---
    const grad = ctx.createRadialGradient(cx, cy - r * 2, r * 0.5, cx, cy, r * 14);
    grad.addColorStop(0,   pal.inner[0]);
    grad.addColorStop(0.5, pal.inner[1]);
    grad.addColorStop(1,   pal.outer[0]);
    buildHeartPath(r);
    ctx.fillStyle = grad;
    ctx.fill();

    // --- Shine / specular highlight ---
    const shine = ctx.createRadialGradient(cx - r * 3, cy - r * 5, r * 1, cx, cy, r * 10);
    shine.addColorStop(0,   'rgba(255,255,255,0.35)');
    shine.addColorStop(0.4, 'rgba(255,255,255,0.05)');
    shine.addColorStop(1,   'rgba(255,255,255,0)');
    buildHeartPath(r);
    ctx.fillStyle = shine;
    ctx.fill();

    // --- Outline ---
    buildHeartPath(r);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    // --- Particles ---
    if (showParticles) particles.forEach(p => { p.update(); p.draw(); });
}

// ── Animation loop ────────────────────────────────────
function animate() {
    t += 0.025;

    if (pulsing) {
        scale += pulseDir * 0.006;
        if (scale > 1.12) pulseDir = -1;
        if (scale < 0.90) pulseDir =  1;
    }

    draw();
    requestAnimationFrame(animate);
}
animate();

// ── Controls ──────────────────────────────────────────
document.getElementById('btnPulse').addEventListener('click', function() {
    pulsing = !pulsing;
    this.textContent = pulsing ? '💓 Pulse' : '⏸ Pause';
});

document.getElementById('btnColor').addEventListener('click', function() {
    colorMode = (colorMode + 1) % colorPalettes.length;
    const names = ['💗 Rose', '💜 Purple', '💙 Cyan', '💛 Gold'];
    this.textContent = '🎨 ' + names[colorMode];
});

document.getElementById('btnRain').addEventListener('click', function() {
    showParticles = !showParticles;
    this.textContent = showParticles ? '✨ Particles' : '⬜ Hide';
});

document.getElementById('btnSave').addEventListener('click', function() {
    // draw once more on a plain dark bg for the saved file
    const tmp = document.createElement('canvas');
    tmp.width  = W;
    tmp.height = H;
    const tc   = tmp.getContext('2d');
    tc.fillStyle = '#0d0d1a';
    tc.fillRect(0, 0, W, H);
    tc.drawImage(canvas, 0, 0);
    const link = document.createElement('a');
    link.download = 'beautiful-heart.png';
    link.href = tmp.toDataURL('image/png');
    link.click();
});
</script>
</body>
</html>
